name: Mobile CI

on:
  push:
    branches: [dev]
    paths:
      - 'code/mobile/**'
  pull_request:
    branches: [main, dev]
    paths:
      - 'code/mobile/**'
  workflow_dispatch:
    inputs:
      build_platform:
        description: 'Platform to build (android/ios)'
        required: false
        default: 'android'

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: code/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: code/mobile

      - name: Run linter
        run: npm run lint
        working-directory: code/mobile
        continue-on-error: true

  expo-check:
    name: Expo Doctor Check
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: code/mobile

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Run Expo Doctor
        run: npx expo-doctor
        working-directory: code/mobile
        continue-on-error: true

  eas-build:
    name: EAS Build (Manual Only)
    runs-on: ubuntu-latest
    needs: expo-check
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: code/mobile

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build Android APK
        run: eas build --platform android --profile preview --non-interactive
        working-directory: code/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
