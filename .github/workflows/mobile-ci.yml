# ─────────────────────────────────────────────────────────────
# Mobile CI — React Native + Expo
# EAS builds are manual-trigger only (expensive / slow)
# ─────────────────────────────────────────────────────────────
name: Mobile CI

on:
  push:
    branches: [develop]
    paths:
      - 'code/mobile/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'code/mobile/**'
  workflow_dispatch:
    inputs:
      build_platform:
        description: 'Platform (android / ios)'
        required: false
        default: 'android'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: code/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: code/mobile

      - name: Run linter
        run: npm run lint
        working-directory: code/mobile
        continue-on-error: true

  eas-build:
    name: EAS Build (manual only)
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: code/mobile

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: EAS Build
        run: eas build --platform ${{ github.event.inputs.build_platform }} --profile preview --non-interactive
        working-directory: code/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
