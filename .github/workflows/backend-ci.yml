name: Backend CI

on:
  push:
    branches: [dev]
    paths:
      - 'code/backend/**'
  pull_request:
    branches: [main, dev]
    paths:
      - 'code/backend/**'

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: code/backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: code/backend

      - name: Run linter
        run: npm run lint
        working-directory: code/backend

      - name: Run tests
        run: npm test
        working-directory: code/backend
        env:
          NODE_ENV: test
          JWT_ACCESS_SECRET: test-secret-key-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: code/backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: code/backend

      - name: Build
        run: npm run build
        working-directory: code/backend

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/dev'

    steps:
      - name: Trigger Render Staging Deploy
        run: |
          curl -X POST ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_URL }} \
          -H "Content-Type: application/json"
        continue-on-error: true

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render Production Deploy
        run: |
          curl -X POST ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }} \
          -H "Content-Type: application/json"
