# ─────────────────────────────────────────────────────────────
# Render deployment configuration — ADLCS
# Docs: https://render.com/docs/blueprint-spec
# ─────────────────────────────────────────────────────────────

services:
  - type: web
    name: adlcs-backend
    env: node
    plan: free
    rootDir: code/backend

    # ── Build ────────────────────────────────────────────────
    # 1. npm ci   — install exact versions from lockfile
    # 2. prisma generate --schema — MUST use explicit --schema flag because
    #    Prisma 6 looks for schema.prisma in the rootDir first. If an empty
    #    schema.prisma exists there (even 0 bytes), it silently wins over
    #    the "prisma.schema" config in package.json when called directly.
    buildCommand: npm ci && npx prisma generate --schema=prisma/schema.prisma

    startCommand: node src/index.js
    branch: main
    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production

      # ── Database ─────────────────────────────────────────────
      # DATABASE_URL_POOLER — PgBouncer / pooled URL (port 5432 on Render)
      #   Used by Prisma Client for all normal queries.
      #   On Render PostgreSQL: Dashboard → your DB → Connections → "Internal Database URL"
      #   (the internal URL is faster than external; use external only from Termux)
      - key: DATABASE_URL_POOLER
        sync: false

      # DATABASE_URL — direct (non-pooled) connection
      #   Required by Prisma for migrations (prisma migrate deploy / db push).
      #   On Render PostgreSQL: same dashboard → "External Database URL"
      - key: DATABASE_URL
        sync: false

      # ── Cache (Upstash Redis) ──────────────────────────────
      # Must be rediss:// (double-s) — Upstash requires TLS
      - key: REDIS_URL
        sync: false

      # ── Auth tokens ────────────────────────────────────────
      # Generate each with:
      #   node -e "console.log(require('crypto').randomBytes(64).toString('hex'))"
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false

      # ── Encryption ─────────────────────────────────────────
      - key: ENCRYPTION_KEY
        sync: false

      # ── Email (Resend) ─────────────────────────────────────
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false

      # ── Media (Cloudinary) ────────────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # ── CORS ──────────────────────────────────────────────
      # WEB_URL — full Vercel URL including https://
      #   Example: https://adlcs-web.vercel.app
      - key: WEB_URL
        sync: false

      # VERCEL_URL — Vercel auto-injects this on their side (hostname only).
      #   On Render you must set it manually. Use just the hostname, no protocol:
      #   Example: adlcs-web.vercel.app   (NOT https://adlcs-web.vercel.app)
      #   security.js normalises it — it adds https:// itself.
      - key: VERCEL_URL
        sync: false
