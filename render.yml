# ─────────────────────────────────────────────────────────────
# Render deployment configuration — TzCRVS
# NOTE: the service slug below (name: adlcs-backend) is the LIVE
# Render service identifier and is intentionally left unchanged —
# renaming it here would not rename the already-deployed service
# and would only create a mismatch. Rename it in the Render
# dashboard first if you want the live service renamed too, then
# update this file to match.
# ─────────────────────────────────────────────────────────────

services:
  - type: web
    name: adlcs-backend
    env: node
    plan: free
    rootDir: code/backend

    # Build order:
    #   1. npm ci                — install exact deps from lockfile
    #   2. prisma generate       -- generate Prisma client from correct schema
    #   3. node prisma/seed.js   -- upsert 4 test users (safe to repeat every deploy)
    buildCommand: npm ci && npx prisma generate --schema=prisma/schema.prisma && node prisma/seed.js

    startCommand: node src/index.js
    branch: main
    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production

      # ── Supabase PostgreSQL ───────────────────────────────────
      # DATABASE_URL_POOLER — Supabase Transaction pooler (port 6543)
      #   Supabase dashboard → Project → Connect → Connection string
      #   → Transaction mode → copy URI
      #   Format: postgresql://postgres.PROJECTREF:PASSWORD@aws-0-REGION.pooler.supabase.com:6543/postgres
      - key: DATABASE_URL_POOLER
        sync: false

      # DATABASE_URL — Supabase direct connection (port 5432)
      #   Supabase dashboard → Project → Connect → Connection string
      #   → Direct connection → copy URI
      #   Format: postgresql://postgres:PASSWORD@db.PROJECTREF.supabase.co:5432/postgres
      - key: DATABASE_URL
        sync: false

      # ── Cache (Upstash Redis) ─────────────────────────────────
      - key: REDIS_URL
        sync: false

      # ── JWT secrets ───────────────────────────────────────────
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false

      # ── Encryption ────────────────────────────────────────────
      - key: ENCRYPTION_KEY
        sync: false

      # ── Email (Resend) ────────────────────────────────────────
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false

      # ── Media (Cloudinary) ────────────────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # ── CORS ──────────────────────────────────────────────────
      # WEB_URL — full Vercel URL with https://
      #   e.g. https://adlcs-web.vercel.app
      - key: WEB_URL
        sync: false

      # VERCEL_URL — hostname only, NO https://, NO trailing slash
      #   e.g. adlcs-web.vercel.app
      - key: VERCEL_URL
        sync: false
